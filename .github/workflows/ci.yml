name: Tafkir CI

on:
  push:
    branches: [main]
    paths:
      - "ml/**"
      - "trainer/**"
      - "data/**"
      - "distributed/**"
      - "checkpoint/**"
      - "tafkir-cli/**"
      - "examples/**"
      - "quantizer/**"
      - "compiler/**"
      - "integration/**"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - "gradle/**"
  pull_request:
    branches: [main]
    paths:
      - "ml/**"
      - "trainer/**"
      - "data/**"
      - "tafkir-cli/**"
      - "examples/**"
      - "build.gradle.kts"
      - "settings.gradle.kts"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Tafkir
        uses: actions/checkout@v4
        with:
          path: tafkir

      - name: Checkout Aljabr dependency
        uses: actions/checkout@v4
        with:
          repository: n90d1n9/aljabr
          path: aljabr

      - name: Setup JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/gradle.properties', '**/build.gradle.kts') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build Aljabr
        working-directory: aljabr
        run: ./gradlew publishToMavenLocal

      - name: Build Tafkir
        working-directory: tafkir
        run: ./gradlew build

      - name: Run XOR training test
        working-directory: tafkir
        run: ./gradlew :trainer:tafkir-trainer-aljabr:test --tests "XORTrainingTest"

      - name: Run JBang hello_tafkir
        working-directory: tafkir
        run: |
          curl -Ls https://sh.jbang.dev | bash -s - examples/jbang/hello_tafkir.java

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: tafkir/**/build/reports/tests/
